name: Security Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Security Tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit

      - name: Compile Check
        run: |
          python -m py_compile cosmicsnip/*.py
          python -m compileall -q cosmicsnip

      - name: Static Security Scan (Bandit)
        run: |
          bandit -q -r cosmicsnip

      - name: Build Dependency Audit Manifest
        run: |
          python - <<'PY'
          import re
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          deps = data.get("project", {}).get("dependencies", [])
          pinned = []
          for dep in deps:
              dep = dep.strip()
              m = re.match(r"^([A-Za-z0-9_.-]+)\s*>=\s*([A-Za-z0-9_.-]+)$", dep)
              if m:
                  # Audit lower bounds as a conservative baseline.
                  pinned.append(f"{m.group(1)}=={m.group(2)}")
                  continue
              if re.match(r"^([A-Za-z0-9_.-]+)==([A-Za-z0-9_.-]+)$", dep):
                  pinned.append(dep)
                  continue
              print(f"Skipping unsupported dependency spec for audit: {dep}")
          out = Path("requirements-audit.txt")
          out.write_text("\n".join(pinned) + "\n", encoding="utf-8")
          print(f"Wrote {out} with {len(pinned)} pinned dependencies.")
          PY

      - name: Dependency Advisory Scan
        run: |
          pip-audit -r requirements-audit.txt --no-deps --disable-pip

  maintainability:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Maintainability Tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
          python -m pip install --upgrade pip
          python -m pip install -r requirements-maintainability.txt
          npm install --prefix .github/tools jscpd
          echo "$GITHUB_WORKSPACE/.github/tools/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run Maintainability Audit
        run: |
          ./scripts/audit-maintainability.sh cosmicsnip | tee maintainability-report.txt

      - name: Upload Maintainability Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintainability-report
          path: maintainability-report.txt
